# ============================================================================
# NGINX REVERSE PROXY CONFIGURATION
# ============================================================================
# This file configures Nginx to route traffic to different applications
#
# What is a reverse proxy?
# - Server that sits between clients and backend servers
# - Client sends request to proxy
# - Proxy forwards request to backend server
# - Backend response sent back through proxy to client
#
# Why use reverse proxy?
# - Single entry point (one IP/port for multiple apps)
# - Load balancing (distribute traffic)
# - Security (hide backend server details)
# - Compression (reduce bandwidth)
# - Caching (improve performance)
#
# Application routing:
# /              → Nginx welcome page
# /portfolio     → Portfolio app (port 3001)
# /weather       → Weather app (port 3002)
# /stopwatch     → Stopwatch app (port 3003)
# /game          → Tic Tac Toe game (port 3004)
# /jenkins       → Jenkins CI/CD (port 8080)
#
# ============================================================================

# ============================================================================
# UPSTREAM SERVERS DEFINITION
# ============================================================================
# Define backend servers that Nginx will proxy to

# Portfolio upstream
upstream portfolio_backend {
    server portfolio:80;  # Docker service name:port
    # If running on host: localhost:3001
}

# Weather app upstream
upstream weather_backend {
    server weather-app:80;
    # If running on host: localhost:3002
}

# Stopwatch upstream
upstream stopwatch_backend {
    server stopwatch:80;
    # If running on host: localhost:3003
}

# Tic Tac Toe upstream
upstream tictactoe_backend {
    server tic-tac-toe:80;
    # If running on host: localhost:3004
}

# Jenkins upstream
upstream jenkins_backend {
    server jenkins:8080;
    # If running on host: localhost:8080
}

# ============================================================================
# MAIN SERVER BLOCK
# ============================================================================
# Main Nginx configuration

server {
    # Listen on port 80 (HTTP)
    listen 80 default_server;
    listen [::]:80 default_server;

    # Server name (domain or IP)
    server_name _;

    # Max upload size (for Jenkins file uploads)
    client_max_body_size 100M;

    # ====================================================================
    # LOGGING
    # ====================================================================
    # Access logs: Record all requests
    access_log /var/log/nginx/access.log combined;
    # Error logs: Record errors
    error_log /var/log/nginx/error.log warn;

    # ====================================================================
    # ROOT LOCATION
    # ====================================================================
    # Default page at /
    location = / {
        return 200 "DevOps Platform - All Services Running\n";
        add_header Content-Type text/plain;
    }

    # ====================================================================
    # PORTFOLIO APPLICATION
    # ====================================================================
    # Route: /portfolio
    location /portfolio {
        # Remove /portfolio prefix before sending to backend
        # Request: /portfolio/index.html
        # Proxied to: /index.html
        rewrite ^/portfolio/(.*) /$1 break;

        # Proxy settings
        proxy_pass http://portfolio_backend;
        proxy_http_version 1.1;

        # Headers for proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ====================================================================
    # WEATHER APPLICATION
    # ====================================================================
    # Route: /weather
    location /weather {
        rewrite ^/weather/(.*) /$1 break;
        proxy_pass http://weather_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ====================================================================
    # STOPWATCH APPLICATION
    # ====================================================================
    # Route: /stopwatch
    location /stopwatch {
        rewrite ^/stopwatch/(.*) /$1 break;
        proxy_pass http://stopwatch_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ====================================================================
    # TIC TAC TOE GAME
    # ====================================================================
    # Route: /game
    location /game {
        rewrite ^/game/(.*) /$1 break;
        proxy_pass http://tictactoe_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ====================================================================
    # JENKINS CI/CD
    # ====================================================================
    # Route: /jenkins or direct :8080
    location /jenkins {
        # Note: Jenkins UI may expect root at /
        # This can require Jenkins configuration
        proxy_pass http://jenkins_backend;
        proxy_http_version 1.1;

        # WebSocket support (for Jenkins SSE)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Jenkins specific
        proxy_set_header X-Script-Name /jenkins;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Large buffers for Jenkins
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # ====================================================================
    # STATIC FILES CACHING
    # ====================================================================
    # Cache static assets for performance
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ====================================================================
    # SECURITY HEADERS
    # ====================================================================
    # Headers to prevent common attacks

    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS protection
    add_header X-XSS-Protection "1; mode=block" always;

    # Content Security Policy (basic)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    # ====================================================================
    # COMPRESSION
    # ====================================================================
    # Compress responses to reduce bandwidth

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ====================================================================
    # ERROR PAGES
    # ====================================================================
    # Custom error messages

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    # ====================================================================
    # REDIRECT HTTP TO HTTPS (OPTIONAL)
    # ====================================================================
    # Uncomment to enable HTTPS redirection (requires SSL setup)
    # if ($scheme != "https") {
    #     return 301 https://$server_name$request_uri;
    # }

    # ====================================================================
    # SSL CONFIGURATION (OPTIONAL)
    # ====================================================================
    # For HTTPS/SSL setup (e.g., Let's Encrypt)
    # Uncomment and configure when adding SSL
    #
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

}

# ============================================================================
# TROUBLESHOOTING NOTES
# ============================================================================
#
# If proxy_pass doesn't work:
# 1. Check service names match docker-compose service names
# 2. Verify services are running: docker-compose ps
# 3. Check network connectivity between containers
# 4. View Nginx logs: docker-compose logs nginx
#
# If rewrite not working:
# 1. Check regex pattern is correct
# 2. Test with: curl http://localhost/portfolio/index.html
# 3. Check backend is receiving correct path
#
# If timeouts occur:
# 1. Increase proxy_*_timeout values
# 2. Check backend application is responsive
# 3. Check network latency
#
# For debugging:
# 1. Add debug logging: error_log /var/log/nginx/debug.log debug;
# 2. View detailed logs: tail -f /var/log/nginx/error.log
# 3. Test Nginx config: nginx -t
#
# ============================================================================
# IMPORTANT CONCEPTS
# ============================================================================
#
# proxy_pass:
# - Forwards request to backend server
# - Format: proxy_pass http://upstream_name;
#
# upstream:
# - Group of backend servers
# - Nginx can load balance across multiple servers
#
# rewrite:
# - Modifies request URI
# - rewrite ^/app/(.*) /$1 break; removes /app prefix
#
# proxy_set_header:
# - Adds/modifies headers sent to backend
# - X-Forwarded-For: Original client IP
# - Host: Original request host
#
# ============================================================================
