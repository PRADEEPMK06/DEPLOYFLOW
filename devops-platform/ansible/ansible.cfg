# ============================================================================
# ANSIBLE CONFIGURATION FILE
# ============================================================================
# Ansible settings and defaults
#
# What is ansible.cfg?
# - Configuration file for Ansible behavior
# - Controls logging, inventory, parallelism, etc.
# - Overrides default settings
# - Searched in order: current dir, home dir, /etc/ansible/
#
# ============================================================================

[defaults]

# ============================================================================
# INVENTORY
# ============================================================================

# Default inventory file
inventory = ./inventory.ini

# ============================================================================
# EXECUTION
# ============================================================================

# Number of parallel processes
forks = 5

# Timeout for connections (seconds)
timeout = 30

# Retry failed hosts
max_retries = 3

# ============================================================================
# GATHERING
# ============================================================================

# Gather host facts automatically
gather_facts = True

# ============================================================================
# OUTPUT AND LOGGING
# ============================================================================

# Disable logging of task arguments (security)
no_log = False

# Verbose output
#verbosity = 1

# Allow undefined variables in templates (strict=True fails on undefined)
strict = False

# ============================================================================
# PRIVILEGE ESCALATION
# ============================================================================

# Default become method (sudo)
become_method = sudo

# Require password for sudo
# Set to True if your user requires password
#ask_become_pass = True

# ============================================================================
# CONNECTION
# ============================================================================

# Default connection type
connection = smart

# ============================================================================
# HOST KEY CHECKING
# ============================================================================

# Don't ask about SSH host key (useful for first connection)
host_key_checking = False

# ============================================================================
# RETRY FILES
# ============================================================================

# Location for retry files
retry_files_enabled = True
retry_files_save_path = ./retry/

# ============================================================================
# DEPRECATION
# ============================================================================

# Warn about deprecated features
deprecation_warnings = True

# ============================================================================
# CALLBACKS
# ============================================================================

# Use more compact output format
stdout_callback = json

# ============================================================================
# PLUGINS AND PATHS
# ============================================================================

# Additional paths to search for roles
roles_path = ./roles

# ============================================================================
# COWSAY
# ============================================================================

# Show cowsay fortune (optional, fun feature)
#nocows = True

# ============================================================================
# EXAMPLE USAGE
# ============================================================================
#
# Run playbook with this config:
# ansible-playbook playbook.yml
#
# Override settings on command line:
# ansible-playbook -i custom_inventory.ini playbook.yml
# ansible-playbook -e "variable_name=value" playbook.yml
# ansible-playbook -u custom_user playbook.yml
#
# ============================================================================
