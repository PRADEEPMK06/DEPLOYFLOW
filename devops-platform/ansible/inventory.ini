# ============================================================================
# ANSIBLE INVENTORY FILE
# ============================================================================
# Defines the hosts/servers that Ansible will manage
#
# What is inventory?
# - List of hosts that Ansible controls
# - Can be servers, groups, variables
# - Can be static file or dynamic script
#
# Format:
# - INI format (this file)
# - YAML format (alternative)
# - Dynamic from cloud providers (AWS, GCP, Azure)
#
# ============================================================================

# ============================================================================
# LOCAL INVENTORY GROUP
# ============================================================================
# For running on local machine or when already SSH'd into server

[local]
localhost ansible_connection=local

# ============================================================================
# AWS EC2 INVENTORY GROUP
# ============================================================================
# Production inventory for AWS EC2 instances

[devops_platform]
# Replace with your EC2 public IP or Elastic IP after Terraform creates it
# Example: 54.123.45.67
ec2_instance ansible_host=REPLACE_WITH_EC2_PUBLIC_IP

# ============================================================================
# GROUP VARIABLES
# ============================================================================
# Variables that apply to entire group

[devops_platform:vars]

# SSH configuration
ansible_user=ubuntu                          # Default user for Ubuntu AMI
ansible_ssh_private_key_file=./devops-platform-key.pem  # Path to SSH key (Terraform generated)
ansible_ssh_common_args='-o StrictHostKeyChecking=no'  # Don't ask about host key

# Python interpreter
ansible_python_interpreter=/usr/bin/python3

# Become (sudo) configuration
ansible_become=yes                           # Use sudo for commands
ansible_become_method=sudo                   # Use sudo (not su)
ansible_become_user=root                     # Become root user

# Connection timeout
ansible_connection_timeout=30

# ============================================================================
# DOCKER GROUP
# ============================================================================
# Hosts where Docker will be installed

[docker_hosts]
# All devops_platform hosts also need Docker
ec2_instance

[docker_hosts:vars]
docker_users=ubuntu                          # User to add to docker group

# ============================================================================
# NGINX GROUP
# ============================================================================
# Hosts where Nginx will be configured

[nginx_hosts]
ec2_instance

[nginx_hosts:vars]
nginx_port=80
nginx_worker_processes=auto

# ============================================================================
# JENKINS GROUP
# ============================================================================
# Hosts where Jenkins will run

[jenkins_hosts]
ec2_instance

[jenkins_hosts:vars]
jenkins_port=8080
jenkins_admin_username=admin
# WARNING: Change this password in production!
jenkins_admin_password=admin123

# ============================================================================
# ALL SERVERS
# ============================================================================
# Common variables for all servers

[all:vars]

# Region and timezone
aws_region=us-east-1
timezone=UTC

# System updates
auto_update_enabled=true

# Monitoring and logging
enable_monitoring=false                     # Detailed monitoring (costs money)

# ============================================================================
# DYNAMIC INVENTORY (ADVANCED)
# ============================================================================
# 
# For production, use dynamic inventory from AWS:
# 
# 1. Install AWS plugin:
#    ansible-galaxy collection install amazon.aws
#
# 2. Create aws_ec2.yml:
#    plugin: amazon.aws.aws_ec2
#    regions:
#      - us-east-1
#    filters:
#      tag:Environment: development
#      instance-state-name: running
#
# 3. Use with Ansible:
#    ansible-playbook -i aws_ec2.yml playbook.yml
#
# ============================================================================
# VERIFICATION COMMANDS
# ============================================================================
#
# 1. Test inventory parsing:
#    ansible-inventory -i inventory.ini --list
#
# 2. Test connectivity:
#    ansible all -i inventory.ini -m ping
#
# 3. Run command on all hosts:
#    ansible all -i inventory.ini -m command -a "uptime"
#
# 4. Run command on specific group:
#    ansible docker_hosts -i inventory.ini -m command -a "docker --version"
#
# ============================================================================
